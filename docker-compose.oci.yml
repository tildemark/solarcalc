services:
  solarcalc:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solarcalc-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:R8p4Kx2Nw7Qm5Vb9@postgres:5432/solarcalc?schema=public
      AUTH_SECRET: ${AUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NODE_ENV: production
      PORT: 3000
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - net

  postgres:
    image: postgres:16-alpine
    container_name: solarcalc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: solarcalc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: R8p4Kx2Nw7Qm5Vb9
    volumes:
      - solarcalc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d solarcalc"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - net

volumes:
  solarcalc_pgdata:

networks:
  net:
    external: true
